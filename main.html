<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Signup</title>
  <link rel="stylesheet" href="styles.css">
</head>

<body>
  <form method="post">
    <fieldset>
      <legend>Create Account</legend>

      <ol>
        <li>
          <label for="name">Name:</label>
          <input type="text" name="name" id="name">
        </li>
        <li>
          <label for="email">Email:</label>
          <input type="text" name="email" id="email">
        </li>
        <li>
          <label for="pass">Password:</label>
          <input type="password" name="pass" id="pass">
        </li>
      </ol>

      <label>Male <input type="radio" name="gender" value="M"></label>
      <label>Female <input type="radio" name="gender" value="F"></label>

      <ul>
        <li><label>Games <input type="checkbox" name="hobby" value="Games"></label></li>
        <li><label>Coding <input type="checkbox" name="hobby" value="Coding"></label></li>
        <li><label>Movies <input type="checkbox" name="hobby" value="Movies"></label></li>
        <li><label>Sports <input type="checkbox" name="hobby" value="Sports"></label></li>
      </ul>

      <input type="submit" value="Submit">
      <input type="reset" value="Reset">
    </fieldset>
  </form>
</body>
</html>
